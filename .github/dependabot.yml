version: 2

updates:
  # Dependencies (pnpm uses YAML value "npm" in Dependabot config)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/Toronto'

    open-pull-requests-limit: 5

    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
      include: 'scope'

    labels:
      - 'dependencies'

    # Reduce PR noise: bundle updates.
    groups:
      npm-minor-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      npm-major:
        patterns:
          - '*'
        update-types:
          - 'major'

  # GitHub Actions dependency hygiene (keeps action versions current)
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:15'
      timezone: 'America/Toronto'

    open-pull-requests-limit: 5

    commit-message:
      prefix: 'chore(ci)'
      include: 'scope'

    labels:
      - 'dependencies'

    # TEMPORARY: v6 currently fails CI install with ERR_PNPM_BROKEN_LOCKFILE
    # Exit criteria to remove this ignore:
    # 1) v6 update PR passes ci/quality, ci/build, and ci/policy-consistency
    # 2) no lockfile parser regression is observed in follow-up validation
    # 3) re-evaluate on or before 2026-06-01
    ignore:
      - dependency-name: 'pnpm/action-setup'

    groups:
      gha-all:
        patterns:
          - '*'
